<div class="container-fluid mt-3">
  <!-- CONTROL PANEL -->
  <div class="card shadow-sm border-0 mb-4 p-3 bg-light">
    <div class="row g-3 align-items-end">
      <div class="col-lg-4 col-md-12">
        <label class="small fw-bold text-muted mb-2 d-block">Tools</label>
        <div class="btn-group w-100 shadow-sm">
          <button class="btn btn-primary" (click)="fetchReport()">
            <i class="bi bi-arrow-clockwise"></i> Refresh
          </button>
          <button class="btn btn-danger" (click)="downloadPDF()">
            <i class="bi bi-file-pdf"></i> PDF
          </button>
          <button class="btn btn-info text-white" (click)="askAI()" [disabled]="loadingAI()">
             @if (loadingAI()) { <span class="spinner-border spinner-border-sm me-1"></span> }
             @else { <i class="bi bi-robot"></i> }
             AI Analysis
          </button>
        </div>
      </div>
      
      <div class="col-lg-4 col-md-6">
        <label class="small fw-bold text-muted mb-2">Select Stock:</label>
        <select class="form-select border-primary-subtle" [ngModel]="selectedStock()" (ngModelChange)="selectedStock.set($event); fetchReport()">
          @for (s of stocks(); track s.id) {
            <option [value]="s.nameStock">{{ s.nameStock }}</option>
          }
        </select>
      </div>

      <div class="col-lg-4 col-md-6">
        <label class="small fw-bold text-muted mb-2">Select Product:</label>
        <select class="form-select border-primary-subtle" [ngModel]="selectedGood()" (ngModelChange)="selectedGood.set($event); fetchReport()">
          @for (g of goods(); track g.id) {
            <option [value]="g.nameGood">{{ g.nameGood }}</option>
          }
        </select>
      </div>
    </div>
  </div>

  <!-- AI ADVISOR -->
  @if (aiMessage()) {
    <div [@slideFade] class="alert alert-info border-0 shadow-sm d-flex align-items-center">
      <span class="fs-4 me-3">🤖</span>
      <div class="flex-grow-1">
        <h6 class="fw-bold mb-1">AI Recommendation:</h6>
        <p class="mb-0 small">{{ aiMessage() }}</p>
      </div>
      <button type="button" class="btn-close" (click)="aiMessage.set('')"></button>
    </div>
  }

  <!-- DATA TABLE -->
  <div class="table-responsive rounded-3 shadow-sm border bg-white">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-dark">
        <tr>
          <th class="ps-4">Stock</th>
          <th>Product</th>
          <th class="text-center" style="width: 200px;">Current Stock</th>
        </tr>
      </thead>
      <tbody>
        @for (item of reportData(); track $index) {
          <tr>
            <td class="ps-4">{{ item.nameStock }}</td>
            <td>{{ item.nameGood }}</td>
            <td class="text-center">
              <span [ngClass]="">
                {{ item.qty }} pcs.
              </span>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="3" class="text-center p-5 text-muted">
              <i class="bi bi-box-seam fs-2 d-block mb-2"></i>
              No stock data found
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
